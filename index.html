<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Fantasy Dashboard v0430</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #0f172a; margin-bottom: 30px; font-weight: 800; }
        
        .manager-rank-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .manager-card { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); color: white; padding: 20px; border-radius: 15px; text-align: center; }
        .manager-card .top-label { font-size: 12px; opacity: 0.8; margin-bottom: 5px; display: block; }
        .manager-card .team-name { font-size: 20px; font-weight: 800; margin-bottom: 10px; display: block; }
        .manager-card .efficiency-score { font-size: 32px; font-weight: 900; color: #fbbf24; }

        .standings-wrapper { margin-bottom: 40px; border: 2px solid #0f172a; border-radius: 12px; overflow: hidden; }
        .standings-header { background: #0f172a; color: white; padding: 15px; font-weight: 800; text-align: center; font-size: 18px; }
        .standings-table { width: 100%; border-collapse: collapse; }
        .standings-table th { background: #f1f5f9; padding: 12px; font-size: 13px; color: #475569; }
        .standings-table td { padding: 12px; text-align: center; border-bottom: 1px solid #f1f5f9; font-weight: 600; }
        
        .division-tag { font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 5px; font-weight: normal; }
        .hs-tag { background: #fee2e2; color: #ef4444; }
        .jh-tag { background: #e0f2fe; color: #0ea5e9; }

        .filter-section { margin: 30px 0; text-align: center; }
        .week-selector { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .week-btn { padding: 10px 20px; border: 1px solid #e2e8f0; border-radius: 30px; background: white; cursor: pointer; font-weight: 700; color: #64748b; }
        .week-btn.active { background: #ef4444; color: white; border-color: #ef4444; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2); }

        .tab-buttons { display: flex; justify-content: center; margin-bottom: 15px; }
        .tab-buttons button { padding: 14px 40px; cursor: pointer; border: 1px solid #e2e8f0; background: #f8fafc; font-weight: 700; color: #475569; }
        .tab-buttons button.active { background: #f1f5f9; color: #0f172a; border-bottom: 3px solid #ef4444; }
        .table-wrapper { overflow-x: auto; margin-bottom: 50px; border: 1px solid #e2e8f0; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; font-size: 13px; }
        th, td { padding: 12px 6px; border: 1px solid #f1f5f9; text-align: center; }
        .rank-cell { border-radius: 6px; padding: 6px 2px; display: block; }
        .stat-val { font-weight: 800; display: block; font-size: 14px; }
        .rank-info { font-size: 12px; font-weight: 700; opacity: 0.8; }

        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; background: #f1f5f9; padding: 15px; border-radius: 12px; }
        select { padding: 10px 20px; font-size: 16px; border-radius: 8px; border: 1px solid #cbd5e1; font-weight: 600; }
        .chart-container { position: relative; height: 600px; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚾ MLB Fantasy Dashboard v0430</h1>

    <h2 style="text-align:center; font-size: 20px; color: #475569;">🥇 구단주 운영 실력 TOP 3</h2>
    <div class="manager-rank-section" id="managerTop3"></div>

    <div class="standings-wrapper">
        <div class="standings-header">🏆 Overall Standing (누적 기록 기준)</div>
        <table class="standings-table">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Team Name</th>
                    <th>Division</th>
                    <th>W-L-T</th>
                    <th>Pct (승률)</th>
                    <th>운영 실력</th>
                </tr>
            </thead>
            <tbody id="standingsBody"></tbody>
        </table>
    </div>

    <!-- 이하 기능 동일하게 유지 -->
    <div class="filter-section">
        <div class="week-selector">
            <button class="week-btn active" onclick="updateView('Total')">전체 누적(1-5주)</button>
            <button class="week-btn" onclick="updateView('W1-4')">1-4주차 통합</button>
            <button class="week-btn" onclick="updateView('W5')">5주차 Weekly</button>
        </div>
    </div>

    <div class="tab-buttons">
        <button id="btnHitter" class="active" onclick="toggleTable('hitter')">Hitter Stats</button>
        <button id="btnPitcher" onclick="toggleTable('pitcher')">Pitcher Stats</button>
    </div>
    <div id="tableContainer" class="table-wrapper"></div>

    <div class="controls">
        <label>📊 데이터 시각화: </label>
        <select id="statSelect" onchange="renderDashboard()">
            <optgroup label="Hitter Stats">
                <option value="R">R (득점)</option><option value="HR">HR (홈런)</option>
                <option value="RBI">RBI (타점)</option><option value="SB">SB (도루)</option>
                <option value="OBP">OBP (출루율)</option><option value="OPS">OPS (장타율 포함)</option>
            </optgroup>
            <optgroup label="Pitcher Stats">
                <option value="IP">IP (이닝)</option><option value="ERA">ERA (방어율) ↓</option>
                <option value="WHIP">WHIP (출루허용) ↓</option><option value="K_BB">K/BB (삼진/볼넷)</option>
                <option value="QS">QS (퀄리티 스타트)</option><option value="SV_H">SV+H (세이브+홀드)</option>
                <option value="NW">NW (넷승)</option>
            </optgroup>
        </select>
    </div>
    <div class="chart-container">
        <canvas id="statChart"></canvas>
    </div>
</div>

<script>
    Chart.register(ChartDataLabels);

    const leagueStandings = [
        { rank: 1, name: "Real Twins", div: "현석", wlt: "41-25-4", pct: 0.614 },
        { rank: 2, name: "Murry-Ker Daehyun", div: "지훈", wlt: "38-28-4", pct: 0.571 },
        { rank: 3, name: "Sleeping Jihoo", div: "현석", wlt: "42-27-1", pct: 0.607 },
        { rank: 4, name: "10 LuckyVickies", div: "현석", wlt: "39-27-4", pct: 0.586 },
        { rank: 5, name: "Multi Champion", div: "현석", wlt: "36-27-7", pct: 0.564 },
        { rank: 6, name: "Sakers_sAviOr", div: "지훈", wlt: "37-28-5", pct: 0.564 },
        { rank: 7, name: "Cho Biden", div: "현석", wlt: "34-34-2", pct: 0.500 },
        { rank: 8, name: "Chief Residents", div: "지훈", wlt: "31-34-5", pct: 0.479 },
        { rank: 9, name: "Kook Surfer", div: "현석", wlt: "30-35-5", pct: 0.464 },
        { rank: 10, name: "HanManDoo Jr.", div: "현석", wlt: "28-39-3", pct: 0.421 },
        { rank: 11, name: "daily sia", div: "지훈", wlt: "27-39-4", pct: 0.414 },
        { rank: 12, name: "Make MooMool Great Again", div: "지훈", wlt: "25-37-8", pct: 0.414 },
        { rank: 13, name: "Yubu airdoshi", div: "지훈", wlt: "25-38-7", pct: 0.407 },
        { rank: 14, name: "Not Seoul Mayor", div: "지훈", wlt: "26-41-3", pct: 0.393 }
    ];

    const rawData = {
        teams: leagueStandings.map(s => s.name),
        W1_4: {
            hitter: {
                R: [87, 80, 102, 110, 111, 108, 87, 85, 113, 94, 83, 114, 89, 115],
                HR: [24, 21, 29, 35, 37, 25, 24, 27, 24, 18, 11, 28, 19, 29],
                RBI: [95, 93, 99, 92, 93, 93, 95, 96, 77, 81, 76, 103, 89, 100],
                SB: [14, 26, 12, 9, 15, 18, 14, 13, 26, 12, 16, 21, 10, 8],
                OBP: [0.324, 0.325, 0.331, 0.347, 0.344, 0.349, 0.324, 0.336, 0.338, 0.336, 0.307, 0.331, 0.310, 0.336],
                OPS: [0.709, 0.723, 0.735, 0.809, 0.807, 0.761, 0.709, 0.753, 0.748, 0.731, 0.647, 0.759, 0.656, 0.754]
            },
            pitcher: {
                IP: [165, 204.3, 188, 210, 216.7, 170, 223.3, 197.3, 169, 215, 191.7, 179.7, 163.7, 150],
                ERA: [3.33, 3.61, 3.40, 2.91, 4.53, 4.76, 3.99, 4.06, 3.62, 3.60, 4.18, 3.61, 3.90, 4.56],
                WHIP: [1.06, 1.13, 1.23, 1.15, 1.37, 1.21, 1.22, 1.31, 1.21, 1.30, 1.25, 1.06, 1.33, 1.41],
                K_BB: [3.24, 3.15, 2.15, 2.83, 2.29, 2.40, 3.22, 2.77, 3.03, 2.47, 2.96, 3.02, 2.26, 2.16],
                QS: [12, 14, 11, 18, 13, 9, 15, 10, 10, 10, 11, 11, 11, 9],
                SV_H: [11, 2, 16, 7, 10, 11, 17, 12, 12, 9, 11, 15, 15, 10],
                NW: [0, 7, 3, 9, -5, 0, -2, -3, 2, 2, -4, 1, 4, -7]
            }
        },
        Total: {
            hitter: {
                R: [121, 119, 131, 150, 139, 143, 110, 111, 140, 121, 109, 158, 119, 150],
                HR: [37, 30, 39, 45, 45, 37, 32, 34, 28, 26, 23, 39, 28, 40],
                RBI: [145, 122, 123, 115, 127, 129, 124, 121, 104, 100, 103, 139, 113, 131],
                SB: [17, 33, 19, 11, 24, 23, 22, 17, 32, 14, 22, 27, 13, 9],
                OBP: [0.335, 0.333, 0.342, 0.363, 0.344, 0.339, 0.327, 0.334, 0.333, 0.336, 0.313, 0.338, 0.324, 0.339],
                OPS: [0.782, 0.744, 0.766, 0.832, 0.804, 0.766, 0.716, 0.757, 0.722, 0.734, 0.688, 0.775, 0.694, 0.775]
            },
            pitcher: {
                IP: [211, 260.2, 261, 283.2, 267.2, 233, 285, 261.1, 214.2, 273.2, 253, 236, 196, 199],
                ERA: [3.84, 3.66, 4.10, 3.36, 4.34, 4.17, 3.98, 4.44, 3.98, 3.78, 3.77, 3.85, 4.04, 4.52],
                WHIP: [1.10, 1.15, 1.33, 1.17, 1.32, 1.23, 1.25, 1.42, 1.22, 1.27, 1.21, 1.08, 1.33, 1.44],
                K_BB: [3.24, 3.15, 2.19, 2.78, 2.46, 2.37, 3.15, 2.35, 3.01, 2.79, 3.02, 3.10, 2.41, 2.16],
                QS: [15, 19, 16, 22, 16, 14, 18, 13, 13, 12, 17, 14, 13, 12],
                SV_H: [13, 2, 18, 10, 14, 14, 24, 13, 15, 9, 14, 21, 16, 16],
                NW: [-2, 6, 4, 8, -6, 5, 1, -4, 0, 4, 0, 0, 1, -7]
            }
        }
    };

    function getRank(v, arr, lowGood = false) {
        const sorted = [...arr].sort((a, b) => lowGood ? a - b : b - a);
        return sorted.indexOf(v) + 1;
    }

    function calcManagerPower() {
        return leagueStandings.map((t, idx) => {
            const hR = (getRank(rawData.Total.hitter.R[idx], rawData.Total.hitter.R) + 
                       getRank(rawData.Total.hitter.HR[idx], rawData.Total.hitter.HR) +
                       getRank(rawData.Total.hitter.RBI[idx], rawData.Total.hitter.RBI) +
                       getRank(rawData.Total.hitter.OPS[idx], rawData.Total.hitter.OPS)) / 4;
            
            const pR = (getRank(rawData.Total.pitcher.ERA[idx], rawData.Total.pitcher.ERA, true) + 
                       getRank(rawData.Total.pitcher.WHIP[idx], rawData.Total.pitcher.WHIP, true) +
                       getRank(rawData.Total.pitcher.K_BB[idx], rawData.Total.pitcher.K_BB) +
                       getRank(rawData.Total.pitcher.QS[idx], rawData.Total.pitcher.QS)) / 4;
            
            const score = Number(((hR + pR) / 2 - t.rank).toFixed(2));
            return { ...t, score };
        }).sort((a, b) => b.score - a.score);
    }

    function updateView(v) {
        currentWeek = v;
        document.querySelectorAll('.week-btn').forEach(b => b.classList.toggle('active', b.onclick.toString().includes(v)));
        renderDashboard();
    }

    function toggleTable(type) {
        currentTableType = type;
        document.getElementById('btnHitter').classList.toggle('active', type === 'hitter');
        document.getElementById('btnPitcher').classList.toggle('active', type === 'pitcher');
        renderTable();
    }

    function getGrad(r, t) {
        const ratio = (r - 1) / (t - 1);
        return `rgb(${Math.round(239 + (254 - 239) * ratio)}, ${Math.round(68 + (240 - 68) * ratio)}, ${Math.round(68 + (138 - 68) * ratio)})`;
    }

    function renderDashboard() {
        const stat = document.getElementById('statSelect').value;
        const currentData = (currentWeek === 'Total') ? rawData.Total : 
                            (currentWeek === 'W1-4') ? rawData.W1_4 : 
                            calcWeekly(rawData.Total, rawData.W1_4);
        
        const ctx = document.getElementById('statChart').getContext('2d');
        const set = { ...currentData.hitter, ...currentData.pitcher };
        const combined = rawData.teams.map((name, i) => ({ name, val: set[stat][i] }));
        const lowGood = ['ERA', 'WHIP'].includes(stat);
        combined.sort((a, b) => lowGood ? a.val - b.val : b.val - a.val);

        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: combined.map(d => d.name), datasets: [{ data: combined.map(d => d.val), backgroundColor: combined.map((d, i) => getGrad(i + 1, 14)), borderRadius: 8 }] },
            options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, datalabels: { anchor: 'end', align: 'right', color: '#1e293b', font: { weight: '800' } } } }
        });
        renderTable();
    }

    function calcWeekly(curr, prev) {
        const res = { hitter: {}, pitcher: {} };
        ['hitter', 'pitcher'].forEach(type => {
            Object.keys(curr[type]).forEach(k => {
                res[type][k] = curr[type][k].map((v, i) => 
                    (['OBP', 'OPS', 'ERA', 'WHIP', 'K_BB'].includes(k)) ? v : Number((v - prev[type][k][i]).toFixed(1))
                );
            });
        });
        return res;
    }

    function renderTable() {
        const currentData = (currentWeek === 'Total') ? rawData.Total : 
                            (currentWeek === 'W1-4') ? rawData.W1_4 : 
                            calcWeekly(rawData.Total, rawData.W1_4);
        
        const set = currentTableType === 'hitter' ? currentData.hitter : currentData.pitcher;
        const keys = Object.keys(set);
        let html = '<table><thead><tr><th>Team Name</th>' + keys.map(k => `<th>${k}</th>`).join('') + '</tr></thead><tbody>';
        rawData.teams.forEach((name, idx) => {
            const info = leagueStandings.find(s => s.name === name);
            html += `<tr><td style="text-align:left; font-weight:800; padding-left:15px;">${name} <span class="division-tag ${info.div === '현석' ? 'hs-tag' : 'jh-tag'}">${info.div}</span></td>`;
            keys.forEach(k => {
                const val = set[k][idx];
                const r = [...set[k]].sort((a, b) => (['ERA', 'WHIP'].includes(k)) ? a - b : b - a).indexOf(val) + 1;
                html += `<td><div class="rank-cell" style="background:${getGrad(r, 14)};"><span class="stat-val">${val}</span><span class="rank-info">${r}위</span></div></td>`;
            });
            html += '</tr>';
        });
        document.getElementById('tableContainer').innerHTML = html + '</tbody></table>';
    }

    window.onload = () => {
        const pow = calcManagerPower();
        // Top 3 카드
        document.getElementById('managerTop3').innerHTML = pow.slice(0, 3).map((m, i) => `
            <div class="manager-card">
                <span class="top-label">운영 실력 ${i+1}위</span>
                <span class="team-name">${m.name}</span>
                <div class="efficiency-score">${m.score > 0 ? '+' : ''}${m.score}</div>
            </div>
        `).join('');

        // 오버롤 스탠딩 표
        document.getElementById('standingsBody').innerHTML = pow.sort((a, b) => a.rank - b.rank).map(s => `
            <tr>
                <td>${s.rank}</td>
                <td style="text-align:left;">${s.name} <span class="division-tag ${s.div === '현석' ? 'hs-tag' : 'jh-tag'}">${s.div}</span></td>
                <td>${s.div} 리그</td> <!-- 디비전 명시 -->
                <td>${s.wlt}</td>
                <td>${s.pct.toFixed(3)}</td>
                <td style="color:${s.score > 0 ? '#ef4444' : '#3b82f6'}">${s.score > 0 ? '+' : ''}${s.score}</td>
            </tr>
        `).join('');
        renderDashboard();
    };
</script>

</body>
</html>
